name: Reader
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Reader:
    type: application
    platform: iOS
    sources:
      - Reader
    settings:
      base:
        INFOPLIST_FILE: Reader/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.Reader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: onnxruntime
      - package: onnxruntime
        product: onnxruntime_extensions

  ReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReaderTests
    settings:
      base:
        INFOPLIST_FILE: ReaderTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ReaderTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Reader.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Reader"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: Reader

packages:
  onnxruntime:
    url: https://github.com/spitfire02020-collab/onnxruntime-swift-package-manager
    branch: main

schemes:
  Reader:
    build:
      targets:
        Reader: all
    test:
      targets:
        - ReaderTests
    run:
      config: Debug
    test:
      config: Debug
